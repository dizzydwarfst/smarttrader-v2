services:
  smarttrader:
    build: .
    container_name: smarttrader-bot
    restart: always          # Auto-restart on crash = 24/7 uptime
    ports:
      - "8000:8000"          # Dashboard accessible at http://your-server:8000
    env_file:
      - .env                 # All config from your .env file
    environment:
      - API_HOST=0.0.0.0     # Listen on all interfaces inside container
    volumes:
      - ./trades.db:/app/trades.db           # Persist trade history
      - ./soul.md:/app/soul.md               # Persist bot memory
      - ./skills.md:/app/skills.md           # Persist skills snapshot
      - ./ai_review_state.json:/app/ai_review_state.json  # Persist AI review cursor
      - ./strategy_cards:/app/strategy_cards  # Strategy configs
    healthcheck:
      # Deep health check — verifies DB, heartbeat, OANDA, frontend, disk.
      # Returns 503 if any CRITICAL check fails; Docker will mark unhealthy
      # and (with restart: always) the orchestrator can recycle.
      test: ["CMD", "python", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/api/health', timeout=5); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
